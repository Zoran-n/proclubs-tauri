version: 2
updates:
  # Dépendances npm (frontend + Tauri CLI)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # Éviter les montées de version majeure automatiques
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Dépendances Cargo (backend Rust)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Actions GitHub
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
