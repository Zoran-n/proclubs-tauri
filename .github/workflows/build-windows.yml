name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-increment version if tag exists
        id: version
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $base = $conf.version
          $parts = $base -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          # Check if tag already exists, if so increment patch
          $version = "$major.$minor.$patch"
          while ($true) {
            $tag = "v$version"
            $exists = gh release view $tag --repo ${{ github.repository }} 2>&1
            if ($LASTEXITCODE -ne 0) {
              break
            }
            $patch++
            $version = "$major.$minor.$patch"
            Write-Host "Tag $tag exists, trying v$version..."
          }

          Write-Host "Final version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

          # Patch all 3 config files with the final version
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -Encoding UTF8

          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace 'version = "[\d\.]+"', "version = `"$version`""
          Set-Content src-tauri/Cargo.toml -Value $cargo -Encoding UTF8 -NoNewline

          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding UTF8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: ProClubs Stats v__VERSION__
          releaseBody: |
            ## ProClubs Stats v__VERSION__

            Application desktop pour les statistiques EA FC Pro Clubs.

            ### Installation Windows
            Télécharge le fichier `.msi` ou `.exe` ci-dessous.

            ### Mise à jour automatique
            Si tu as déjà une version installée, l'app te proposera la mise à jour automatiquement au démarrage.
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "v$version"
          $repo = "${{ github.repository }}"

          # Find the NSIS .sig file
          $nsisZipSig = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $nsisZip = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1

          if (-not $nsisZipSig -or -not $nsisZip) {
            Write-Error "Could not find NSIS zip or signature files"
            exit 1
          }

          $signature = Get-Content $nsisZipSig.FullName -Raw

          # Upload the .nsis.zip to the release
          gh release upload $tag "$($nsisZip.FullName)" --repo $repo --clobber 2>$null

          # Get the actual asset name from the release
          $assets = gh release view $tag --repo $repo --json assets --jq '.assets[].name' | Out-String
          $nsisAssetName = ($assets -split "`n" | Where-Object { $_ -match 'nsis\.zip' -and $_ -notmatch '\.sig' } | Select-Object -First 1).Trim()

          if (-not $nsisAssetName) {
            Write-Host "nsis.zip not found in release assets, using exe instead"
            $exeSig = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
            $exeAssetName = ($assets -split "`n" | Where-Object { $_ -match 'setup\.exe' } | Select-Object -First 1).Trim()

            if ($exeSig -and $exeAssetName) {
              $signature = Get-Content $exeSig.FullName -Raw
              $downloadUrl = "https://github.com/$repo/releases/download/$tag/$exeAssetName"
            }
          } else {
            $downloadUrl = "https://github.com/$repo/releases/download/$tag/$nsisAssetName"
          }

          $json = @{
            version = $version
            notes = "ProClubs Stats $tag"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -FilePath "latest.json" -Encoding UTF8
          Write-Host "Generated latest.json:"
          Write-Host $json

          # Upload latest.json to the release (always to 'latest' tag too)
          gh release upload $tag "latest.json" --repo $repo --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
