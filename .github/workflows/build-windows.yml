name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-increment version
        id: version
        shell: pwsh
        run: |
          $confText = [IO.File]::ReadAllText("src-tauri/tauri.conf.json")
          if ($confText -match '"version"\s*:\s*"(\d+)\.(\d+)\.(\d+)"') {
            $major = [int]$Matches[1]; $minor = [int]$Matches[2]; $patch = [int]$Matches[3]
          } else { Write-Error "Cannot parse version"; exit 1 }

          $origPatch = $patch
          $version = "$major.$minor.$patch"
          while ($true) {
            $null = gh release view "v$version" --repo ${{ github.repository }} --json tagName 2>&1
            if ($LASTEXITCODE -ne 0) { break }
            Write-Host "v$version exists, incrementing..."
            $patch++; $version = "$major.$minor.$patch"
          }

          Write-Host "Version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT

          if ($patch -ne $origPatch) {
            $old = "$major.$minor.$origPatch"
            $confText = $confText.Replace("`"version`": `"$old`"", "`"version`": `"$version`"")
            [IO.File]::WriteAllText("src-tauri/tauri.conf.json", $confText)

            $cargo = [IO.File]::ReadAllText("src-tauri/Cargo.toml")
            $cargo = $cargo.Replace("version = `"$old`"", "version = `"$version`"")
            [IO.File]::WriteAllText("src-tauri/Cargo.toml", $cargo)

            $pkg = [IO.File]::ReadAllText("package.json")
            $pkg = $pkg.Replace("`"version`": `"$old`"", "`"version`": `"$version`"")
            [IO.File]::WriteAllText("package.json", $pkg)
            Write-Host "Patched configs: $old -> $version"
          }
          exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (with signing)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== NSIS ==="
          Get-ChildItem "src-tauri/target/release/bundle/nsis" | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }
          Write-Host "=== MSI ==="
          Get-ChildItem "src-tauri/target/release/bundle/msi" | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Create release and upload artifacts
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $version = "${{ steps.version.outputs.VERSION }}"
          $repo = "${{ github.repository }}"

          # Create release (or update if exists)
          gh release create $tag --repo $repo --title "ProClubs Stats $tag" --notes @"
          ## ProClubs Stats $tag

          Application desktop pour les statistiques EA FC Pro Clubs.

          ### Installation Windows
          Telecharge le fichier .msi ou .exe ci-dessous.

          ### Mise a jour automatique
          Si tu as deja une version installee, l'app proposera la mise a jour automatiquement.
          "@ 2>$null

          # Upload NSIS exe
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '-setup\.exe$' } | Select-Object -First 1
          if ($exe) {
            gh release upload $tag $exe.FullName --repo $repo --clobber
            Write-Host "Uploaded: $($exe.Name)"
          }

          # Upload MSI
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" | Where-Object { $_.Name -match '\.msi$' -and $_.Name -notmatch '\.sig' } | Select-Object -First 1
          if ($msi) {
            gh release upload $tag $msi.FullName --repo $repo --clobber
            Write-Host "Uploaded: $($msi.Name)"
          }

          # Upload nsis.zip (for updater)
          $nsisZip = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '\.nsis\.zip$' } | Select-Object -First 1
          if ($nsisZip) {
            gh release upload $tag $nsisZip.FullName --repo $repo --clobber
            Write-Host "Uploaded: $($nsisZip.Name)"
          }

          # Find signature for latest.json
          $nsisZipSig = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '\.nsis\.zip\.sig$' } | Select-Object -First 1

          if ($nsisZip -and $nsisZipSig) {
            $signature = [IO.File]::ReadAllText($nsisZipSig.FullName).Trim()
            $url = "https://github.com/$repo/releases/download/$tag/$([Uri]::EscapeDataString($nsisZip.Name))"
          } elseif ($exe) {
            $exeSig = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '-setup\.exe\.sig$' } | Select-Object -First 1
            if ($exeSig) {
              $signature = [IO.File]::ReadAllText($exeSig.FullName).Trim()
              $url = "https://github.com/$repo/releases/download/$tag/$([Uri]::EscapeDataString($exe.Name))"
            }
          }

          if ($signature -and $url) {
            $json = @"
          {
            "version": "$version",
            "notes": "ProClubs Stats $tag",
            "pub_date": "$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')",
            "platforms": {
              "windows-x86_64": {
                "signature": "$signature",
                "url": "$url"
              }
            }
          }
          "@
            [IO.File]::WriteAllText("latest.json", $json.Trim())
            Write-Host "=== latest.json ==="
            Get-Content latest.json
            gh release upload $tag "latest.json" --repo $repo --clobber
            Write-Host "latest.json uploaded!"
          } else {
            Write-Host "WARNING: No signature found, latest.json not generated"
            Write-Host "Signing may have failed. Check TAURI_SIGNING_PRIVATE_KEY secret."
          }
          exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
