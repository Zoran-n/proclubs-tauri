name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-increment version if tag exists
        id: version
        shell: pwsh
        run: |
          # Read current version from tauri.conf.json
          $confText = [IO.File]::ReadAllText("src-tauri/tauri.conf.json")
          if ($confText -match '"version"\s*:\s*"(\d+)\.(\d+)\.(\d+)"') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3]
          } else {
            Write-Error "Could not parse version from tauri.conf.json"
            exit 1
          }

          # Increment patch until we find a free tag
          $version = "$major.$minor.$patch"
          while ($true) {
            $tagCheck = gh release view "v$version" --repo ${{ github.repository }} --json tagName 2>&1
            if ($LASTEXITCODE -ne 0) { break }
            Write-Host "Tag v$version exists, incrementing..."
            $patch++
            $version = "$major.$minor.$patch"
          }

          Write-Host "Building version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

          $oldVersion = "$major.$minor.$($Matches[3])"

          # Patch tauri.conf.json (simple string replace)
          $confText = $confText -replace [regex]::Escape("`"version`": `"$oldVersion`""), "`"version`": `"$version`""
          [IO.File]::WriteAllText("src-tauri/tauri.conf.json", $confText)

          # Patch Cargo.toml (first version = line only)
          $cargoText = [IO.File]::ReadAllText("src-tauri/Cargo.toml")
          $cargoText = $cargoText -replace "version = `"$([regex]::Escape($oldVersion))`"", "version = `"$version`""
          [IO.File]::WriteAllText("src-tauri/Cargo.toml", $cargoText)

          # Patch package.json
          $pkgText = [IO.File]::ReadAllText("package.json")
          $pkgText = $pkgText -replace [regex]::Escape("`"version`": `"$oldVersion`""), "`"version`": `"$version`""
          [IO.File]::WriteAllText("package.json", $pkgText)

          Write-Host "Patched all config files to $version"
          exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: ProClubs Stats v__VERSION__
          releaseBody: |
            ## ProClubs Stats v__VERSION__

            Application desktop pour les statistiques EA FC Pro Clubs.

            ### Installation Windows
            Telecharge le fichier `.msi` ou `.exe` ci-dessous.

            ### Mise a jour automatique
            Si tu as deja une version installee, l'app te proposera la mise a jour automatiquement.
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true

      - name: Generate and upload latest.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "v$version"
          $repo = "${{ github.repository }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"

          Write-Host "Looking for artifacts in $bundleDir"
          Get-ChildItem -Path $bundleDir -Recurse | ForEach-Object { Write-Host "  $($_.Name)" }

          # Find nsis.zip and its signature
          $nsisZip = Get-ChildItem -Path $bundleDir | Where-Object { $_.Name -match '\.nsis\.zip$' } | Select-Object -First 1
          $nsisZipSig = Get-ChildItem -Path $bundleDir | Where-Object { $_.Name -match '\.nsis\.zip\.sig$' } | Select-Object -First 1

          if ($nsisZip -and $nsisZipSig) {
            Write-Host "Found: $($nsisZip.Name) + $($nsisZipSig.Name)"
            $signature = [IO.File]::ReadAllText($nsisZipSig.FullName).Trim()

            # Upload the nsis.zip to the release
            gh release upload $tag $nsisZip.FullName --repo $repo --clobber
            $downloadUrl = "https://github.com/$repo/releases/download/$tag/$($nsisZip.Name -replace ' ', '%20')"
          } else {
            # Fallback: use setup.exe
            Write-Host "nsis.zip not found, falling back to setup.exe"
            $exe = Get-ChildItem -Path $bundleDir | Where-Object { $_.Name -match 'setup\.exe$' } | Select-Object -First 1
            $exeSig = Get-ChildItem -Path $bundleDir | Where-Object { $_.Name -match 'setup\.exe\.sig$' } | Select-Object -First 1

            if (-not $exe -or -not $exeSig) {
              Write-Error "No signed artifacts found!"
              Get-ChildItem -Path $bundleDir | ForEach-Object { Write-Host "  $($_.Name)" }
              exit 1
            }

            Write-Host "Found: $($exe.Name) + $($exeSig.Name)"
            $signature = [IO.File]::ReadAllText($exeSig.FullName).Trim()

            # The exe is already uploaded by tauri-action
            $assets = gh release view $tag --repo $repo --json assets --jq '.assets[].name'
            $exeAsset = $assets | Where-Object { $_ -match 'setup\.exe' } | Select-Object -First 1
            $downloadUrl = "https://github.com/$repo/releases/download/$tag/$($exeAsset -replace ' ', '%20')"
          }

          # Build latest.json
          $json = @"
          {
            "version": "$version",
            "notes": "ProClubs Stats $tag",
            "pub_date": "$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')",
            "platforms": {
              "windows-x86_64": {
                "signature": "$signature",
                "url": "$downloadUrl"
              }
            }
          }
          "@

          [IO.File]::WriteAllText("latest.json", $json.Trim())
          Write-Host "Generated latest.json:"
          Get-Content latest.json

          gh release upload $tag "latest.json" --repo $repo --clobber
          Write-Host "Uploaded latest.json to $tag"
          exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
